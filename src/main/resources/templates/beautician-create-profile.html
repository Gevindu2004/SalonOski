<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Beautician Profile - Salon Oski</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-color: #8B4513; --secondary-color: #D2691E; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .profile-card { background: white; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); padding: 40px; max-width: 600px; width: 100%; }
        .profile-header { text-align: center; margin-bottom: 30px; }
        .profile-header i { font-size: 4rem; color: var(--primary-color); margin-bottom: 15px; }
        .info-box { background: #f8f9fa; border-left: 4px solid var(--primary-color); padding: 15px; border-radius: 5px; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="profile-card">
    <div class="profile-header">
        <i class="bi bi-person-badge"></i>
        <h2>Complete Your Beautician Profile</h2>
        <p>Please provide your professional details to start the approval process.</p>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="info-box">
        <i class="bi bi-info-circle-fill text-primary"></i>
        <small class="text-muted">After you submit this form, an approval request is sent to the admin dashboard. You can edit your profile later if the admin asks for changes.</small>
    </div>

    <form method="post" action="/beautician/profile/create">
        <div class="mb-3">
            <label class="form-label"><i class="bi bi-person"></i> Full Name</label>
            <input type="text" class="form-control" th:value="${user.fullName}" readonly disabled>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-envelope"></i> Email</label>
            <input type="email" class="form-control" th:value="${user.email}" readonly disabled>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-telephone"></i> Phone Number <span class="text-danger">*</span></label>
            <input type="tel" name="phone" class="form-control" required placeholder="Enter your phone number" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-scissors"></i> Specialization <span class="text-danger">*</span></label>
            <select name="specialization" class="form-select" required>
                <option value="">Select your specialization</option>
                <option value="Hair Stylist">Hair Stylist</option>
                <option value="Color Specialist">Color Specialist</option>
                <option value="Barber">Barber</option>
                <option value="Hairstylist">Hairstylist</option>
                <option value="Extensions Specialist">Extensions Specialist</option>
                <option value="Texture Specialist">Texture Specialist</option>
                <option value="Bridal Stylist">Bridal Stylist</option>
                <option value="Men's Grooming">Men's Grooming</option>
                <option value="Kids Stylist">Kids Stylist</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label"><i class="bi bi-briefcase"></i> Years of Experience <span class="text-danger">*</span></label>
            <input type="number" name="experience" class="form-control" required min="0" max="50" step="1" placeholder="e.g., 5">
        </div>

        <div class="mb-4">
            <label class="form-label"><i class="bi bi-person-lines-fill"></i> Bio / About Me</label>
            <textarea name="bio" class="form-control" rows="4" placeholder="Tell customers and admins about your experience, specialties, and style."></textarea>
        </div>

        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary" style="background: var(--primary-color); border:none;">
                <i class="bi bi-check-circle"></i> Submit for Approval
            </button>
            <a href="/home" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Back to Home
            </a>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
