<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Salon Accounting</title>
  <link rel="stylesheet" href="accounting.css">
</head>
<body>

<header class="header">
  <h1>Salon Accounting Module</h1>
</header>

<main class="container">

  <!-- Add Transaction -->
  <section class="form-section">
    <h2>Add Transaction</h2>

    <div class="form-group">
      <label>Description</label>
      <input type="text" id="desc" placeholder="e.g. Haircut Service">
    </div>

    <div class="form-group">
      <label>Amount</label>
      <input type="number" id="amount" placeholder="e.g. 2500">
    </div>

    <div class="form-group">
      <label>Type</label>
      <select id="type">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>
    </div>

    <button class="btn-primary" onclick="createTransaction()">Add Transaction</button>
  </section>

  <!-- Transaction Table -->
  <section class="table-section">
    <h2>Transaction Records</h2>

    <table>
      <thead>
      <tr>
        <th>ID</th>
        <th>Description</th>
        <th>Type</th>
        <th>Amount (Rs)</th>
        <th>Actions</th>
      </tr>
      </thead>
      <tbody id="transactionTable">
      <!-- JS loads data here -->
      </tbody>
    </table>
  </section>

</main>

<script src="accounting.js"></script>
</body>
</html>
