<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Salon Oski</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header class="nav-light">
        <h1><img src="/images/logo.jpg" alt="Logo" style="height: 40px; vertical-align: middle; margin-right: 10px;">
            Salon Oski</h1>
        <nav>
            <a href="/home">Home</a>
            <a href="/services">Services</a>
            <a href="/appointment">Appointments</a>
            <a href="/ai-hairstyle">AI Hair Design</a>
            <a href="/about">About Us</a>
        </nav>
        <a href="/login" class="btn-purple" style="margin-left:auto;">Login</a>
    </header>

    <main>
        <section class="appointment-section" style="min-height: 100vh; padding-top: 100px;">
            <div class="appointment-card" style="max-width: 400px;">
                <h2>Welcome Back</h2>
                <p style="margin-bottom: 2rem; color: #666;">Please login to your account</p>

                <form>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="btn-purple btn-block" style="margin-top: 1rem;">Login</button>

                    <div style="margin-top: 1.5rem; font-size: 0.9rem; color: #666;">
                        <a href="#" style="color: #666; text-decoration: none;">Forgot Password?</a>
                        <br><br>
                        Don't have an account? <a href="/signup" style="color: #000; font-weight: 600;">Sign Up</a>
                    </div>
                </form>
            </div>
        </section>
    </main>



</body>

</html>
