<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Appointment - Golden Scissors Salon</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header class="nav-light">
        <h1><img src="/images/logo.jpg" alt="Logo" style="height: 40px; vertical-align: middle; margin-right: 10px;">
            Salon Oski</h1>
        <nav>
            <a href="/home">Home</a>
            <a href="/services">Services</a>
            <a href="/appointment" class="text-accent">Appointments</a>
            <a href="/ai-hairstyle">AI Hair Design</a>
            <a href="/about">About Us</a>
        </nav>
        <a href="/login" class="btn-purple" style="margin-left:auto;">Login</a>
    </header>

    <main>
        <section class="appointment-section">
            <div class="appointment-card">
                <h2>Book Your Appointment</h2>
                <form>
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" placeholder="John Doe" required>
                    </div>

                    <div class="form-group">
                        <label for="date">Preferred Date</label>
                        <input type="date" id="date" name="date" required>
                    </div>

                    <div class="form-group">
                        <label for="service">Service</label>
                        <select id="service" name="service">
                            <option value="haircut">Haircut & Styling</option>
                            <option value="color">Hair Coloring</option>
                            <option value="keratin">Keratin Treatment</option>
                            <option value="beard">Beard Trimming</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-purple btn-block">Confirm Booking</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Salon Oski</p>
    </footer>

</body>

</html>
