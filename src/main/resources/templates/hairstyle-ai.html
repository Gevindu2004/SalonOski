<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Hair Advisor - Salon Oski</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Disable float animation for this page */
        .btn {
            animation: none !important;
        }
    </style>
</head>

<body>

    <header class="nav-light">
        <h1><img src="/images/logo.jpg" alt="Logo" style="height: 40px; vertical-align: middle; margin-right: 10px;">
            Salon Oski</h1>
        <nav>
            <a href="/home">Home</a>
            <a href="/services">Services</a>
            <a href="/appointment">Appointments</a>
            <a href="/ai-hairstyle" class="text-accent">AI Hair Design</a>
            <a href="/about">About Us</a>
        </nav>
        <a href="/login" class="btn-purple" style="margin-left:auto;">Login</a>
    </header>

    <main>
        <section class="ai-section">
            <div class="ai-card">
                <h2>AI Hairstyle Advisor</h2>
                <p>Upload a clear front-facing photo to discover your perfect look.</p>

                <div class="upload-container" onclick="document.getElementById('photoInput').click()">
                    <input type="file" id="photoInput" accept="image/*">
                    <span class="upload-icon">📷</span>
                    <label class="upload-label">Click to Upload Photo</label>
                </div>

                <div id="preview" class="preview-container"></div>

                <button class="btn-purple btn-block" style="margin-top: 2rem;">Analyze Face
                    Shape</button>

                <div id="result"></div>
            </div>
        </section>
    </main>



    <script>
        const photoInput = document.getElementById('photoInput');
        const previewContainer = document.getElementById('preview');
        const analyzeBtn = document.querySelector('.btn-purple.btn-block');
        const resultContainer = document.getElementById('result');

        // Handle File Selection & Preview
        photoInput.addEventListener('change', function () {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    previewContainer.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                }
                reader.readAsDataURL(file);
            }
        });

        // Handle Analyze Button Click
        analyzeBtn.addEventListener('click', async function () {
            const file = photoInput.files[0];
            if (!file) {
                alert("Please upload a photo first!");
                return;
            }

            // Show Loading State
            resultContainer.innerHTML = `
                <div class="result-box">
                    <h3>Analyzing...</h3>
                    <p>Detecting face shape and generating recommendations...</p>
                </div>
            `;
            analyzeBtn.disabled = true;
            analyzeBtn.textContent = "Processing...";

            try {
                const formData = new FormData();
                formData.append("image", file);

                const response = await fetch('/api/ai/analyze', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();

                    // Display Result
                    resultContainer.innerHTML = `
                        <div class="result-box">
                            <h3>Analysis Complete!</h3>
                            <p><strong>Detected Face Shape:</strong> ${data.faceShape}</p>
                            <hr style="margin: 10px 0; border: 0; border-top: 1px solid #ddd;">
                            <p><strong>Heirstyle Recommendation:</strong></p>
                            <p>${data.recommendation.replace(/\n/g, '<br>')}</p>
                        </div>
                    `;
                } else {
                    const errorText = await response.text();
                    resultContainer.innerHTML = `
                        <div class="result-box" style="border-left-color: red;">
                            <h3 style="color: red;">Error</h3>
                            <p>${errorText || "Something went wrong. Please try again."}</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error("Error:", error);
                resultContainer.innerHTML = `
                    <div class="result-box" style="border-left-color: red;">
                        <h3 style="color: red;">Connection Error</h3>
                        <p>Failed to connect to the server. Please check your internet connection.</p>
                    </div>
                `;
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.textContent = "Analyze Face Shape";
            }
        });
    </script>
</body>

</html>
