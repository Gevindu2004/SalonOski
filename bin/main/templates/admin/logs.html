<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Company Logs - SalonX Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00000b;
            --accent: #00000b;
            --bg-light: #f8f9fa;
            --white: #ffffff;
            --text-dark: #333333;
            --text-muted: #666666;
            --danger: #ef4444;
            --shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--primary);
            color: white;
            height: 100vh;
            padding: 2.5rem 1.5rem 5rem;
            box-sizing: border-box;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar h2 {
            font-weight: 700;
            margin-bottom: 3rem;
            font-size: 1.5rem;
            color: white;
            display: flex;
            align-items: center;
        }

        .sidebar h2 img {
            height: 35px;
            width: 35px;
            border-radius: 50%;
            margin-right: 12px;
            object-fit: cover;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 0.85rem 1.25rem;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
            margin-bottom: 0.75rem;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .nav-link i {
            margin-right: 12px;
            width: 20px;
            text-align: center;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 3rem;
            max-width: 1000px;
        }

        .logs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .logs-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0;
        }

        .btn-salon {
            background-color: var(--accent);
            color: white;
            padding: 12px 25px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            transition: opacity 0.3s;
        }

        .btn-salon i {
            margin-right: 8px;
        }

        .btn-salon:hover {
            opacity: 0.9;
        }

        .log-card {
            background: var(--white);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
            border-left: 5px solid var(--accent);
            position: relative;
        }

        .log-card h3 {
            margin: 0 0 1rem;
            font-size: 1.35rem;
            color: var(--text-dark);
        }

        .log-meta {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-bottom: 1px solid var(--bg-light);
            padding-bottom: 1rem;
        }

        .log-meta span {
            display: flex;
            align-items: center;
        }

        .log-meta i {
            margin-right: 6px;
            color: var(--accent);
        }

        .log-content {
            line-height: 1.8;
            color: var(--text-dark);
            margin-bottom: 1.5rem;
            white-space: pre-wrap;
        }

        .log-actions {
            display: flex;
            gap: 1.25rem;
        }

        .btn-action {
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            transition: all 0.2s;
        }

        .btn-edit {
            color: var(--accent);
        }

        .btn-delete {
            color: var(--danger);
        }

        .btn-action i {
            margin-right: 6px;
        }

        .btn-action:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
<div class="sidebar">
    <h2><img src="/images/logo.jpg" alt="Logo"> Admin Panel</h2>
    <a href="/admin/dashboard" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a>
    <a href="/admin/accounting" class="nav-link"><i class="fas fa-chart-line"></i> Accounting</a>
    <a href="/admin/inventory" class="nav-link"><i class="fas fa-boxes-stacked"></i> Inventory</a>
    <a href="/admin/users" class="nav-link"><i class="fas fa-users"></i> Registered Users</a>
    <a href="/admin/appointments" class="nav-link"><i class="fas fa-calendar-check"></i> Appointments</a>
        <a href="/admin/logs" class="nav-link active"><i class="fas fa-clipboard-list"></i> Company Logs</a>
        <a href="/admin/feedback" class="nav-link"><i class="fas fa-comment-alt"></i> Manage Feedback</a>
        <a href="/admin/notifications" class="nav-link"><i class="fas fa-bell"></i> Send Notifications</a>
        <div style="margin-top: auto;">
            <a href="/home" class="nav-link"><i class="fas fa-external-link-alt"></i> View Website</a>
            <a href="/logout" class="nav-link"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
        </div>
    </div>

    <div class="main-content">
        <div class="logs-header">
            <h1>Company Logs</h1>
            <a href="/admin/log/create" class="btn-salon"><i class="fas fa-plus"></i> NEW LOG</a>
        </div>

        <div th:each="log : ${logs}" class="log-card">
            <h3 th:text="${log.title}">Log Title</h3>
            <div class="log-meta">
                <span><i class="far fa-calendar-alt"></i> <span
                        th:text="${log.createdAt != null ? #temporals.format(log.createdAt, 'dd MMM yyyy, HH:mm') : 'N/A'}"></span></span>
                <span><i class="far fa-user"></i> <span th:text="${log.adminEmail}"></span></span>
            </div>
            <div class="log-content" th:text="${log.content}">
                Log content...
            </div>
            <div class="log-actions">
                <a th:href="@{/admin/log/edit/{id}(id=${log.id})}" class="btn-action btn-edit"><i
                        class="far fa-edit"></i> EDIT</a>
                <a th:href="@{/admin/log/delete/{id}(id=${log.id})}" class="btn-action btn-delete"
                    onclick="return confirm('Confirm deletion of this log entry?')"><i class="far fa-trash-alt"></i>
                    DELETE</a>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(logs)}"
            style="text-align: center; color: var(--text-muted); padding: 5rem; background: var(--white); border-radius: 15px; box-shadow: var(--shadow);">
            <i class="fas fa-folder-open" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.3;"></i>
            <p>No records found. Click "NEW LOG" to get started.</p>
        </div>
    </div>
</body>

</html>
