<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="${title}">Create Company Log</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00000b;
            --accent: #00000b;
            --bg-light: #f8f9fa;
            --white: #ffffff;
            --text-dark: #333333;
            --text-muted: #666666;
            --border: #e2e8f0;
            --shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--primary);
            color: white;
            height: 100vh;
            padding: 2.5rem 1.5rem 5rem;
            box-sizing: border-box;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar h2 {
            font-weight: 700;
            margin-bottom: 3rem;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
        }

        .sidebar h2 img {
            height: 35px;
            width: 35px;
            border-radius: 50%;
            margin-right: 12px;
            object-fit: cover;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 0.85rem 1.25rem;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 0.75rem;
            transition: all 0.3s;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .nav-link i {
            margin-right: 12px;
            width: 20px;
            text-align: center;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 3rem;
            max-width: 800px;
        }

        .page-header {
            margin-bottom: 3rem;
        }

        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0;
        }

        .form-card {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
            border-top: 5px solid var(--accent);
        }

        .form-group {
            margin-bottom: 1.75rem;
        }

        label {
            display: block;
            margin-bottom: 0.65rem;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.9rem;
        }

        input,
        textarea {
            width: 100%;
            padding: 0.85rem 1rem;
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-dark);
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 0, 11, 0.05);
        }

        textarea {
            height: 250px;
            resize: vertical;
            line-height: 1.6;
        }

        .form-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--bg-light);
        }

        .btn-salon {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
            font-size: 1rem;
        }

        .btn-salon:hover {
            opacity: 0.9;
        }

        .btn-cancel {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .btn-cancel:hover {
            color: var(--text-dark);
        }
    </style>
</head>

<body>
<div class="sidebar">
    <h2><img src="/images/logo.jpg" alt="Logo"> Admin Panel</h2>
    <a href="/admin/dashboard" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a>
    <a href="/admin/accounting" class="nav-link"><i class="fas fa-chart-line"></i> Accounting</a>
    <a href="/admin/inventory" class="nav-link"><i class="fas fa-boxes-stacked"></i> Inventory</a>
    <a href="/admin/users" class="nav-link"><i class="fas fa-users"></i> Registered Users</a>
    <a href="/admin/appointments" class="nav-link"><i class="fas fa-calendar-check"></i> Appointments</a>
        <a href="/admin/logs" class="nav-link active"><i class="fas fa-clipboard-list"></i> Company Logs</a>
        <a href="/admin/feedback" class="nav-link"><i class="fas fa-comment-alt"></i> Manage Feedback</a>
        <a href="/admin/notifications" class="nav-link"><i class="fas fa-bell"></i> Send Notifications</a>
        <div style="margin-top: auto;">
            <a href="/home" class="nav-link"><i class="fas fa-external-link-alt"></i> View Website</a>
            <a href="/logout" class="nav-link"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
        </div>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1 th:text="${title}">Create Log</h1>
            <p style="color: var(--text-muted);">Manage company communications and administrative records.</p>
        </div>

        <div class="form-card">
            <form th:action="@{/admin/log/save}" th:object="${log}" method="post">
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{createdAt}">

                <div class="form-group">
                    <label>Log Title</label>
                    <input type="text" th:field="*{title}" placeholder="e.g., Seasonal Haircare Campaign Update"
                        required>
                </div>

                <div class="form-group">
                    <label>Log Content</label>
                    <textarea th:field="*{content}" placeholder="Detailed report or log entry..." required></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-salon">SAVE RECORD</button>
                    <a href="/admin/logs" class="btn-cancel">CANCEL</a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
